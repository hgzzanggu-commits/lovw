<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Log Pro</title>
    <style>
        :root { --main-cyan: #00f2ff; --bg-dark: #0a0a0c; }
        body { 
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Pretendard', -apple-system, sans-serif;
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* 액체 배경 - CSS 변수 --h 사용 */
        .liquid-bg {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(180deg, #00f2ff 0%, #0062ff 100%);
            height: var(--h); /* 여기서 에러 안 나게 처리 */
            transition: height 1.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1; filter: drop-shadow(0 0 30px #00f2ff);
        }

        .wave {
            position: absolute; top: -50px; left: 0; width: 200%; height: 100px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 200"><path fill="%2300f2ff" d="M0,160 C400,160 400,40 800,40 C1200,40 1200,160 1600,160 L1600,200 L0,200 Z"/></svg>');
            background-size: 50% 100%; animation: waveMove 4s linear infinite;
        }
        @keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .glass-card {
            position: relative; z-index: 10; width: 320px; padding: 45px 30px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px;
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .label { font-size: 11px; letter-spacing: 4px; opacity: 0.5; margin-bottom: 5px; }
        .count-val { font-size: 90px; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 0 30px var(--main-cyan); }
        .rate-info { font-size: 18px; font-weight: 600; color: var(--main-cyan); margin-top: 5px; }
        .goal-info { font-size: 13px; opacity: 0.4; margin-bottom: 35px; }

        .btn-drink {
            background: white; color: black; border: none; width: 100%;
            padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }
        .btn-drink:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

        .settings-form { margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; opacity: 0.5; }
        .goal-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 35px; text-align: center; border-radius: 5px; padding: 3px; outline: none; }
        
        .history-pills { margin-top: 25px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-height: 60px; overflow-y: auto; }
        .pill { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 8px; font-size: 10px; opacity: 0.6; }

        .reset-link { margin-top: 25px; display: block; font-size: 10px; color: #ff4b2b; text-decoration: none; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="liquid-bg" style="--h: {{ rate if rate <= 100 else 100 }}%;">
        <div class="wave"></div>
    </div>

    <div class="glass-card">
        <div class="label">CURRENT INTAKE</div>
        <h1 class="count-val">{{ count }}</h1>
        <div class="rate-info">{{ rate }}% DONE</div>
        <div class="goal-info">Goal: {{ goal }} Cups</div>

        <form action="/drink" method="post">
            <button type="submit" class="btn-drink">DRINK +1</button>
        </form>

        <form action="/set_goal" method="post" class="settings-form">
            <span>SET GOAL</span>
            <input type="number" name="goal" class="goal-input" value="{{ goal }}">
            <button type="submit" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold;">OK</button>
        </form>

        <div class="history-pills">
            {% for time in records %}
                <div class="pill">{{ time }}</div>
            {% endfor %}
        </div>

        <a href="/reset" class="reset-link" onclick="return confirm('초기화할까요?')">RESET ALL DATA</a>
    </div>

</body>
</html>
