<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUA CORE 3D - PERFECT HYDRATION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --water-color: #00f2ff;
            --water-deep: #0062ff;
            --glass-reflection: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #020205 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            /* [제왕의 봉인] 긁어갈 수 없는 성역!! */
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        input { user-select: text; } /* 입력창은 자애롭게 허용한다!! */

        .scene {
            position: relative;
            width: 260px; height: 450px;
            transform-style: preserve-3d;
            animation: goldenPerfectRotation 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        @keyframes goldenPerfectRotation {
            0% { transform: rotateY(0deg) rotateX(10deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(380deg) rotateX(5deg) scale(1); opacity: 1; }
        }

        .wobble-cup, .wobble-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d; pointer-events: none; 
        }

        .wobble-cup { animation: eternalWobble 6s infinite ease-in-out; animation-delay: 2.5s; }
        .wobble-text { animation: eternalWobble 6s infinite ease-in-out; animation-delay: 2.8s; }

        @keyframes eternalWobble {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
            25% { transform: rotateY(-3.5deg) rotateX(-1deg); } 
            75% { transform: rotateY(3.5deg) rotateX(1deg); }  
        }

        .neon-percent {
            position: absolute; top: -80px; left: 0; width: 100%;
            text-align: center; font-size: 4rem; font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--water-color), 0 0 40px var(--water-color), 0 0 80px var(--water-deep);
            transform: translateZ(50px);
            animation: floatNeon 3s infinite ease-in-out;
        }

        @keyframes floatNeon {
            0%, 100% { transform: translateZ(50px) translateY(0); }
            50% { transform: translateZ(50px) translateY(-5px); }
        }

        .tank {
            position: absolute; width: 100%; height: 100%;
            border: 3px solid var(--glass-reflection); border-radius: 40px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px);
            box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.1), 0 0 30px rgba(0, 0, 0, 0.5);
            z-index: 2; overflow: hidden;
            animation: sereneFloat 4s infinite ease-in-out; animation-delay: 2.5s; 
        }

        @keyframes sereneFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .water-body {
            position: absolute; bottom: 0; left: 0; right: 0; height: 0; 
            background: linear-gradient(180deg, var(--water-color), var(--water-deep));
            border-radius: 0 0 40px 40px; 
            transition: height 2s cubic-bezier(0.19, 1, 0.22, 1);
            transform-style: preserve-3d;
        }

        .water-surface {
            position: absolute; top: 0; left: 0; width: 100%; height: 20px;
            background: var(--water-color); border-radius: 50%;
            filter: brightness(1.3); box-shadow: 0 0 30px var(--water-color);
            transform: rotateX(75deg) translateY(-50%);
        }

        .ui-container {
            position: absolute; right: -300px; width: 250px;
            text-align: left; pointer-events: auto; 
            transform: translateZ(30px); z-index: 10; 
        }

        .counter-group h1 {
            font-size: 3rem; margin: 0;
            text-shadow: 0 0 20px var(--water-color); letter-spacing: -2px;
        }

        .status-text { color: var(--water-color); font-weight: 900; margin-bottom: 30px; }

        .control-panel {
            background: rgba(255, 255, 255, 0.1); padding: 20px;
            border-radius: 20px; border: 1px solid var(--glass-reflection);
        }

        input[type="number"] {
            width: 80%; background: transparent; border: none;
            border-bottom: 2px solid var(--water-color);
            color: white; padding: 10px; margin-bottom: 20px; font-family: inherit;
        }

        .btn-ora {
            width: 100%; padding: 15px; background: var(--water-color);
            border: none; border-radius: 12px; color: #000; font-weight: 900;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .btn-ora:hover:not(:disabled) {
            transform: scale(1.05) translateZ(20px);
            box-shadow: 0 0 30px var(--water-color);
        }

        .btn-sub {
            background: transparent; border: 1px solid var(--water-color);
            color: var(--water-color); margin-top: 10px; font-size: 0.7rem;
        }

        .cup-container {
            display: flex; flex-wrap: wrap; width: 100%;
            margin-bottom: 10px; min-height: 25px;
        }

        .cup-icon {
            font-size: 1.2rem; width: 10%; text-align: center;
            text-shadow: 0 0 10px var(--water-color);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn { 
            0% { transform: scale(0) rotate(-45deg); opacity: 0; } 
            100% { transform: scale(1) rotate(0deg); opacity: 1; } 
        }

        .firework-particle {
            position: fixed; width: 4px; height: 4px;
            background: var(--water-color); border-radius: 50%;
            box-shadow: 0 0 15px var(--water-color), 0 0 30px #fff;
            pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="wobble-text"><div class="neon-percent" id="neonPercent">0%</div></div>
        <div class="wobble-cup">
            <div class="tank">
                <div class="water-body" id="waterBody"><div class="water-surface"></div></div>
            </div>
            <div class="ui-container">
                <div class="counter-group">
                    <div class="status-text">CURRENT HYDRATION</div>
                    <div class="cup-container" id="cupContainer"></div>
                    <h1 id="counterDisplay">{{ config.count }} / {{ config.goal }}</h1>
                </div>
                <div class="control-panel">
                    <form action="/add" method="post" id="drinkForm">
                        <button type="submit" class="btn-ora">ORA ORA! DRINK!!</button>
                    </form>
                
                    <form action="/set_goal" method="post" style="margin-top: 20px;" id="goalForm" novalidate>
                        <input type="text" name="goal" id="goalInput" 
                               placeholder="SET NEW GOAL" 
                               inputmode="numeric" required 
                               style="width: 80%; background: transparent; border: none; border-bottom: 2px solid var(--water-color); color: white; padding: 10px; margin-bottom: 20px; font-family: inherit;"
                               oninput="
                                   if(/[^0-9]/.test(this.value)) {
                                       this.setCustomValidity('숫자만 입력 가능합니다');
                                       this.reportValidity();
                                       // [디오의 지혜] 말풍선을 보여준 뒤 불순물을 제거하라!!
                                       this.value = this.value.replace(/[^0-9]/g, '');
                                   } else {
                                       this.setCustomValidity('');
                                   }
                               ">
                        <button type="submit" class="btn-ora btn-sub">EVOLVE GOAL</button>
                    </form>
                 </div>
            </div>
        </div>
    </div>

    <script>
        const scene = document.querySelector('.scene');
        let isDragging = false;
        let startX, startY;
        let currentRotX = 5, currentRotY = 20; 
        const LIMIT_X = { min: -15, max: 25 }, LIMIT_Y = { min: -40, max: 60 }; 

        window.onload = () => {
            updateWaterView({{ rate | default(0) }}, "{{ config.count }} / {{ config.goal }}");
            renderCups({{ config.cups | default(0) }}); 
        };

        /* 드래그 회전 비술 */
        document.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return; 
            scene.style.opacity = '1'; 
            scene.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg) scale(1)`;
            isDragging = true; startX = e.clientX; startY = e.clientY;
            scene.style.animation = 'none'; scene.style.transition = 'none';
            document.body.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = (e.clientX - startX) * 0.1; 
            const dy = (e.clientY - startY) * 0.1;
            let nY = currentRotY + dx, nX = currentRotX - dy;
            nX = Math.max(LIMIT_X.min, Math.min(nX, LIMIT_X.max));
            nY = Math.max(LIMIT_Y.min, Math.min(nY, LIMIT_Y.max));
            scene.style.transform = `rotateX(${nX}deg) rotateY(${nY}deg) scale(1)`;
        });

        document.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false; document.body.style.cursor = 'default';
            const match = scene.style.transform.match(/rotateX\(([-\d.]+)deg\)\s*rotateY\(([-\d.]+)deg\)/);
            if (match) { currentRotX = parseFloat(match[1]); currentRotY = parseFloat(match[2]); }
            scene.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
        });

        /* 수조 & 텍스트 업데이트 */
        function updateWaterView(rate, statusText) {
            const waterBody = document.getElementById('waterBody');
            const neonEl = document.getElementById('neonPercent');
            const counterH1 = document.getElementById('counterDisplay');

            waterBody.style.height = `${rate}%`;
            if (counterH1) counterH1.innerText = statusText;

            let currentRate = parseInt(neonEl.innerText) || 0;
            let targetRate = Math.floor(rate);
            if (window.waterInterval) clearInterval(window.waterInterval);

            window.waterInterval = setInterval(() => {
                if (currentRate < targetRate) currentRate++;
                else if (currentRate > targetRate) currentRate--;
                else { clearInterval(window.waterInterval); return; }
                neonEl.innerText = currentRate + '%';
            }, 10);
        }

        /* 컵 렌더링 & 미니 폭죽 */
        function renderCups(cupCount) {
            const container = document.getElementById('cupContainer');
            const currentItems = container.querySelectorAll('.cup-icon').length;

            if (cupCount > currentItems) {
                for(let i = currentItems; i < cupCount; i++) {
                    const cup = document.createElement('div');
                    cup.className = 'cup-icon'; cup.innerText = '💧'; 
                    container.appendChild(cup);
                    shootMiniFirework(cup); 
                }
            } else if (cupCount < currentItems) {
                container.innerHTML = ''; 
                for(let i = 0; i < cupCount; i++) {
                    const cup = document.createElement('div');
                    cup.className = 'cup-icon'; cup.innerText = '💧'; 
                    container.appendChild(cup);
                }
            }
        }

        function shootMiniFirework(targetEl) {
            const rect = targetEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            for(let i = 0; i < 15; i++) {
                let p = document.createElement('div');
                p.className = 'firework-particle'; p.style.top = `${cy}px`; p.style.left = `${cx}px`;
                document.body.appendChild(p);
                let angle = Math.random() * Math.PI * 2, vel = 30 + Math.random() * 60;
                let tx = Math.cos(angle) * vel, ty = Math.sin(angle) * vel;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], { duration: 500 + Math.random() * 300, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function shootFireworks() {
            for(let i = 0; i < 40; i++) {
                let p = document.createElement('div');
                p.className = 'firework-particle'; p.style.width = '8px'; p.style.height = '8px';
                document.body.appendChild(p);
                let angle = Math.random() * Math.PI * 2, vel = 80 + Math.random() * 150;
                let tx = Math.cos(angle) * vel, ty = Math.sin(angle) * vel;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], { duration: 800 + Math.random() * 600, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        /* 메인 폼 전송 (세계의 일순) */
        document.getElementById('drinkForm').onsubmit = async function(e) {
            e.preventDefault();
            const drinkBtn = document.querySelector('#drinkForm .btn-ora');
            try {
                const response = await fetch('/add', { method: 'POST', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                if (response.ok) {
                    const data = await response.json();
                    if (data.reset_happened) {
                        drinkBtn.disabled = true; drinkBtn.style.opacity = '0.5'; drinkBtn.innerText = "COOLING DOWN...";
                        if (window.waterInterval) clearInterval(window.waterInterval);
                        document.getElementById('waterBody').style.height = '0%';
                        document.getElementById('neonPercent').innerText = '0%';
                        document.getElementById('counterDisplay').innerText = `0 / ${data.goal}`;

                        setTimeout(() => {
                            drinkBtn.disabled = false; drinkBtn.style.opacity = '1'; drinkBtn.innerText = "ORA ORA! DRINK!!";
                            renderCups(data.cups);
                            updateWaterView(data.rate, `${data.count} / ${data.goal}`);
                        }, 1500);
                    } else {
                        renderCups(data.cups);
                        updateWaterView(data.rate, `${data.count} / ${data.goal}`);
                        if (data.burst) shootFireworks();
                    }
                }
            } catch (err) { console.error("무슨 지거리야!!", err); }
        };

        /* 목표 설정 결계 */
        // [목표 설정 감시 스탠드: 말풍선 에디션!!]
/* [목표 설정 감시 스탠드: 말풍선 에디션!!] */
    /* [목표 설정 감시 스탠드: 말풍선 에디션!!] */
    /* [목표 설정 감시 스탠드: 말풍선 마스터!!] */
/* [목표 설정 감시 스탠드: 최종 완성형] */
    document.getElementById('goalForm').onsubmit = function(e) {
        const goalInput = document.getElementById('goalInput');
        const val = goalInput.value.trim();

        // 1. [핵심!!] 아무 값도 입력하지 않고 버튼을 눌렀다면!!
        if (!val) {
            e.preventDefault(); // 전송을 막아라!! 무다무다!!
            goalInput.setCustomValidity("숫자를 입력해 주세요");
            goalInput.reportValidity(); 
            return false;
        }

        // 2. 숫자가 0 이하인 '원숭이' 같은 값도 체크하라!!
        if (parseInt(val) <= 0) {
            e.preventDefault(); 
            goalInput.setCustomValidity("이놈! 오직 1 이상의 숫자만이 허용되는 거라고!!");
            goalInput.reportValidity(); 
            return false;
        }
        
        // 3. 모든 관문을 통과했다면 결계를 풀고 전송하라!!
        goalInput.setCustomValidity(""); 
    };
    </script>
</body>
</html>
